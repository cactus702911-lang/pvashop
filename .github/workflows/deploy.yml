name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          rm -rf .deploy
          mkdir .deploy
          cp -R dist/* .deploy/
          if [ -f dist/.nojekyll ]; then cp dist/.nojekyll .deploy/; fi

          git checkout --orphan gh-pages
          git reset --hard
          git clean -fdx
          cp -R .deploy/* .
          rm -rf .deploy
          touch .nojekyll

          git add -A
          git commit -m "Deploy to GitHub Pages" || true
          git push origin gh-pages --force
